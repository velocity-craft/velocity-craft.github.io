<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Craft</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 16px; line-height: 1.7; color: #222; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
  h1 { font-size: 28px; margin-bottom: 4px; }
  .tagline { font-size: 15px; color: #888; margin-bottom: 32px; }
  .apps { list-style: none; padding: 0; width: 100%; max-width: 400px; }
  .apps a { display: block; padding: 16px; margin: 8px 0; background: #f8f8f8; border-radius: 12px; text-decoration: none; color: #222; font-size: 16px; font-weight: 600; transition: background 0.2s; }
  .apps a:hover { background: #eee; }
  .apps .desc { font-size: 13px; font-weight: 400; color: #888; margin-top: 2px; }
  .contact { font-size: 13px; color: #888; margin-top: 32px; }
  .contact a { color: #555; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #ddd; }
    .apps a { background: #2a2a2a; color: #ddd; }
    .apps a:hover { background: #333; }
    .apps .desc { color: #999; }
    .contact a { color: #aaa; }
  }
</style>
</head>
<body>

<h1>Velocity Craft</h1>
<p class="tagline">Building tools that respect your time</p>

<ul class="apps">
  <li><a href="/draftly/">Draftly<div class="desc">Smart note-taking for your thoughts</div></a></li>
  <li><a href="/jeter-player/">Jeter Player<div class="desc">Your media, your way</div></a></li>
</ul>

<p class="contact">Contact: <a href="mailto:kate.sw.kelly@gmail.com">kate.sw.kelly@gmail.com</a></p>

</body>
</html>
